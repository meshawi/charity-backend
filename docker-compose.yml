services:
  db:
    image: mysql:8.0
    container_name: charity-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: charity_database
      MYSQL_USER: charity_user
      MYSQL_PASSWORD: charity_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: charity-app
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: charity_database
      DB_USER: charity_user
      DB_PASSWORD: charity_password
      JWT_SECRET: charity-jwt-secret-key-change-in-production
      FRONTEND_URL: http://localhost:5173
      DOCUMENTS_BASE_PATH: /app/documents
      PDF_STORAGE_PATH: /app/documents/PDFs
      REPORTS_STORAGE_PATH: /app/documents/Reports
      BACKUPS_PATH: /app/documents/Backups
    ports:
      - "3000:3000"
    volumes:
      - charity_documents:/app/documents
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  charity_documents:
